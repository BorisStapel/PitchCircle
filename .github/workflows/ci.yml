name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: xcodebuild build -project PitchCircle.xcodeproj -scheme PitchCircle -destination 'platform=iOS Simulator,name=iPhone 17'

      - name: Test
        run: xcodebuild test -project PitchCircle.xcodeproj -scheme PitchCircle -destination 'platform=iOS Simulator,name=iPhone 17'
